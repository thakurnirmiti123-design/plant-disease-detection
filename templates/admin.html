<!DOCTYPE html>
<html>
<head>
<title>Admin Panel | Plant Disease Detection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

{% include 'navbar.html' %}

<style>

 body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #e2efe2;
            background-image: radial-gradient(#d0e4d0 1px, transparent 1px);
            background-size: 20px 20px;
            color: #2f3e2f;
     }

.header 
{
    background-color: #1b5e20;
    font-size: 18px;
    font-weight: 600;
    padding: 20px 40px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
        
.head-title{
    color: white !important;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

/* Page container */

.admin-container{
    max-width:1100px;
    margin:60px auto;
}

/* Section card */

.admin-card{
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.06);
}

/* Page title */

.page-title{
    font-size:26px;
    font-weight:600;
    color:#1b5e20;
    margin-bottom:30px;
}

/* Stats cards */

.stats-row{
    display:flex;
    gap:20px;
    margin-bottom:30px;
}

.stat-card{
    flex:1;
    background:#f1f8f1;
    padding:25px;
    border-radius:14px;
    text-align:center;
    border:1px solid #c8e6c9;
}

.stat-number{
    font-size:30px;
    font-weight:600;
    color:#1b5e20;
}

.stat-label{
    font-size:14px;
    color:#5a6d5a;
}

/* Chart */

.chart-box{
    background:#ffffff;
    padding:25px;
    border-radius:14px;
    border:1px solid #e0f2e0;
    margin-bottom:35px;
}

/* Table */

.table-container{
    background:white;
    border-radius:14px;
    border:1px solid #e0f2e0;
    overflow:hidden;
}

.table-header{
    background:#1b5e20;
    color:white;
}

.table-wrapper{
    max-height:350px;
    overflow-y:auto;
}

.table td, .table th{
    vertical-align:middle;
}

/* Delete button */

.btn-delete{
    background:#c62828;
    border:none;
    padding:6px 12px;
    border-radius:6px;
    color:white;
}

.btn-delete:hover{
    background:#8e0000;
}

.chart-box{
    width: 350px;
    margin:auto;
}

.main-container{
    max-width: 950px;
    margin: 60px auto;
}


</style>

</head>

<body>

<div class="admin-container">

<div class="admin-card">

<div class="page-title">
Admin Dashboard
</div>

<!-- Stats -->

<div class="stats-row">

<div class="stat-card">
<div class="stat-number">{{ total_users }}</div>
<div class="stat-label">Registered Users</div>
</div>

<div class="stat-card">
<div class="stat-number">{{ total_predictions }}</div>
<div class="stat-label">Total Analyses</div>
</div>

</div>

<!-- Chart -->

<div class="chart-box">
<h5 class="mb-3">Disease Distribution</h5>
<canvas id="diseaseChart"></canvas>
</div><br><br>

<!-- Prediction Table -->

<div class="table-container">

<div class="table-wrapper">

<table class="table">

<thead class="table-header">

<tr>
<th>ID</th>
<th>User</th>
<th>Disease</th>
<th>Confidence</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for p in predictions %}

<tr>

<td>{{ p.id }}</td>

<td>{{ p.username }}</td>

<td>{{ p.disease }}</td>

<td>{{ p.confidence }}%</td>

<td>

<a href="/delete_prediction/{{p.id}}">
<button class="btn-delete">Delete</button>
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const ctx = document.getElementById('diseaseChart');

new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: {{ labels | tojson }},
        datasets: [{
            data: {{ values | tojson }},
            backgroundColor: [
                '#66bb6a',
                '#ef5350',
                '#ffa726'
            ],
            borderWidth: 0
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                position: 'bottom'
            }
        }
    }
});

</script>

</body>
</html>
