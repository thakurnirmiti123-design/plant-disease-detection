<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
body {
    background-color: #e2efe2;
    background-image: radial-gradient(#d0e4d0 1px, transparent 1px);
    background-size: 20px 20px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    padding: 20px; /* for mobile spacing */
}

.login-card {
    background: white;
    padding: 30px 25px; /* slightly smaller padding for mobile */
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    transition: all 0.3s ease;
}

.login-title {
    font-weight: 600;
    color: #1b5e20;
}

.form-control {
    border-radius: 10px;
    padding: 12px;
}

.btn-login {
    background: #2e7d32;
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-weight: 500;
}

.btn-login:hover {
    background: #1b5e20;
}

.password-wrapper {
    position: relative;
}

.toggle-password {
    position: absolute;
    top: 50%;
    right: 15px;
    transform: translateY(-50%);
    cursor: pointer;
    color: #6c757d;
}

.toggle-password:hover {
    color: #2e7d32;
}

.brand {
    font-size: 22px;
    font-weight: 600;
    color: #2e7d32;
}

/* Spinner overlay */
#spinner-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    display: none; /* hidden by default */
}

.spinner-border {
    width: 3rem;
    height: 3rem;
}

/* Mobile adjustments */
@media (max-width: 576px) {
    .login-card {
        padding: 25px 15px;
        border-radius: 15px;
    }

    .brand {
        font-size: 20px;
    }

    .form-control {
        padding: 10px;
    }

    .btn-login {
        padding: 10px;
    }
}
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <div class="brand">Login</div>
    </div>

    <form id="login-form" method="POST">
        <div class="mb-3">
            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Enter Username"
                   required>
        </div>

        <div class="mb-3 password-wrapper">
            <input type="password"
                   name="password"
                   id="password"
                   class="form-control"
                   placeholder="Enter Password"
                   required>
            <i class="fa-solid fa-eye toggle-password"
               id="eyeIcon"
               onclick="togglePassword()"></i>
        </div>

        <button type="submit" class="btn btn-login w-100 text-white" id="login-btn">
            Login
        </button>
    </form>
    
    <p class="mt-3 text-center">New User? <a href="/register">Register</a></p>
</div>

<!-- Spinner overlay -->
<div id="spinner-overlay">
    <div class="spinner-border text-success" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>

<script>
function togglePassword() {
    const password = document.getElementById("password");
    const eyeIcon = document.getElementById("eyeIcon");

    if (password.type === "password") {
        password.type = "text";
        eyeIcon.classList.remove("fa-eye");
        eyeIcon.classList.add("fa-eye-slash");
    } else {
        password.type = "password";
        eyeIcon.classList.remove("fa-eye-slash");
        eyeIcon.classList.add("fa-eye");
    }
}

// Show spinner when form is submitted
const form = document.getElementById("login-form");
form.addEventListener("submit", () => {
    document.getElementById("login-btn").disabled = true;
    document.getElementById("spinner-overlay").style.display = "flex";
});
</script>

</body>
</html>
